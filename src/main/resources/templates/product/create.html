<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Thêm sản phẩm mới</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
	<style>
		body {
			background-color: #f0f2f5;
		}

		.navbar {
			background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
		}

		.navbar-brand,
		.nav-link {
			color: #fff !important;
			font-weight: 600;
		}

		.form-card {
			border: none;
			border-radius: 16px;
			box-shadow: 0 8px 32px rgba(0, 0, 0, 0.10);
			overflow: hidden;
		}

		.form-card-header {
			background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
			color: white;
			padding: 1.5rem 2rem;
		}

		.form-card-header h4 {
			margin: 0;
			font-weight: 700;
		}

		.form-card-body {
			padding: 2rem;
		}

		.form-label {
			font-weight: 600;
			color: #444;
		}

		.form-control,
		.form-select {
			border-radius: 10px;
			border: 1.5px solid #dee2e6;
			padding: 0.6rem 1rem;
			transition: all 0.2s;
		}

		.form-control:focus,
		.form-select:focus {
			border-color: #764ba2;
			box-shadow: 0 0 0 3px rgba(118, 75, 162, 0.15);
		}

		.btn-save {
			background: linear-gradient(135deg, #667eea, #764ba2);
			border: none;
			color: white;
			padding: 0.65rem 2rem;
			border-radius: 10px;
			font-weight: 600;
			font-size: 1rem;
			transition: all 0.3s;
		}

		.btn-save:hover {
			transform: translateY(-2px);
			box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
			color: white;
		}

		.btn-back {
			border-radius: 10px;
			padding: 0.65rem 1.5rem;
			font-weight: 600;
		}

		.file-upload-area {
			border: 2px dashed #c0aae0;
			border-radius: 10px;
			padding: 1.5rem;
			text-align: center;
			cursor: pointer;
			transition: all 0.2s;
			background: #faf8ff;
		}

		.file-upload-area:hover {
			border-color: #764ba2;
			background: #f3f0ff;
		}

		.file-upload-area .bi {
			font-size: 2rem;
			color: #764ba2;
		}

		.error-msg {
			color: #dc3545;
			font-size: 0.85rem;
			margin-top: 0.25rem;
		}

		footer {
			text-align: center;
			padding: 2rem;
			color: #888;
			margin-top: 2rem;
		}
	</style>
</head>

<body>
	<nav class="navbar navbar-expand-lg mb-4">
		<div class="container">
			<a class="navbar-brand" href="/"><i class="bi bi-house-fill me-2"></i>Home</a>
			<div class="navbar-nav">
				<a class="nav-link" href="/products"><i class="bi bi-box-seam me-1"></i>Products</a>
			</div>
		</div>
	</nav>

	<div class="container" style="max-width: 700px;">
		<div class="form-card card">
			<div class="form-card-header">
				<h4><i class="bi bi-plus-circle me-2"></i>Thêm sản phẩm mới</h4>
			</div>
			<div class="form-card-body">
				<form action="/products/create" method="post" enctype="multipart/form-data" th:object="${productModel}">

					<div class="mb-3">
						<label for="name" class="form-label">Tên sản phẩm <span class="text-danger">*</span></label>
						<input type="text" class="form-control" id="name" th:field="*{name}"
							placeholder="Nhập tên sản phẩm...">
						<div class="error-msg" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
					</div>

					<div class="mb-3">
						<label for="price" class="form-label">Giá sản phẩm <span class="text-danger">*</span></label>
						<div class="input-group">
							<span class="input-group-text" style="border-radius:10px 0 0 10px;"><i
									class="bi bi-currency-dollar"></i></span>
							<input type="number" class="form-control" id="price" th:field="*{price}"
								placeholder="Nhập giá (1 - 9,999,999)" min="1" max="9999999"
								style="border-radius:0 10px 10px 0;">
						</div>
						<div class="error-msg" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
					</div>

					<div class="mb-3">
						<label for="categoryId" class="form-label">Danh mục <span class="text-danger">*</span></label>
						<select class="form-select" id="categoryId" th:field="*{categoryId}">
							<option value="" disabled selected>-- Chọn danh mục --</option>
							<option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
						</select>
					</div>

					<div class="mb-4">
						<label class="form-label">Hình ảnh <span class="text-danger">*</span></label>
						<div class="file-upload-area" onclick="document.getElementById('imageFile').click()">
							<i class="bi bi-cloud-arrow-up d-block mb-1"></i>
							<p class="mb-1 fw-semibold text-secondary" id="file-label">Chọn hoặc thả ảnh vào đây</p>
							<small class="text-muted">Tên file tối đa 200 ký tự</small>
							<input type="file" id="imageFile" name="imageFile" style="display:none" accept="image/*"
								onchange="updateLabel(this)">
						</div>
						<div class="error-msg" th:if="${#fields.hasErrors('image')}" th:errors="*{image}"></div>
					</div>

					<div class="d-flex gap-2">
						<button type="submit" class="btn btn-save">
							<i class="bi bi-save me-1"></i>Thêm sản phẩm
						</button>
						<a href="/products" class="btn btn-outline-secondary btn-back">
							<i class="bi bi-arrow-left me-1"></i>Quay lại
						</a>
					</div>
				</form>
			</div>
		</div>
		<footer>© 2025 – Phát triển ứng dụng với J2EE</footer>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
	<script>
		function updateLabel(input) {
			const label = document.getElementById('file-label');
			if (input.files && input.files[0]) {
				label.textContent = input.files[0].name;
				label.style.color = '#764ba2';
			}
		}
	</script>
</body>

</html>
